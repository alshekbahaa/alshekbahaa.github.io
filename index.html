<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مهند الشيخ بهاء | مطور ورائد أعمال</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }
    
    body::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      top: -250px;
      right: -250px;
      animation: float 20s infinite ease-in-out;
    }
    
    body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      bottom: -200px;
      left: -200px;
      animation: float 15s infinite ease-in-out reverse;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(10deg); }
    }
    
    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 3rem 2.5rem;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
      position: relative;
      z-index: 1;
      animation: slideUp 0.6s ease;
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .avatar {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: white;
      border: 4px solid rgba(255,255,255,0.3);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    
    h1 {
      font-size: 2rem;
      font-weight: 900;
      text-align: center;
      color: white;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    
    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.9);
      font-size: 1rem;
      margin-bottom: 2rem;
      font-weight: 300;
    }
    
    .bio {
      background: rgba(255,255,255,0.1);
      padding: 1.2rem;
      border-radius: 15px;
      margin-bottom: 2rem;
      color: rgba(255,255,255,0.95);
      font-size: 0.95rem;
      line-height: 1.7;
      text-align: center;
    }
    
    .links {
      display: grid;
      gap: 0.8rem;
    }
    
    .link {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(255,255,255,0.2);
      padding: 1rem 1.3rem;
      border-radius: 15px;
      text-decoration: none;
      color: white;
      font-weight: 600;
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .link:hover {
      background: rgba(255,255,255,0.3);
      transform: translateX(-5px);
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }
    
    .link i {
      font-size: 1.3rem;
      width: 30px;
      text-align: center;
    }
    
    .footer {
      margin-top: 2rem;
      text-align: center;
      color: rgba(255,255,255,0.7);
      font-size: 0.85rem;
    }
    
    @media (max-width: 600px) {
      .card { padding: 2rem 1.5rem; }
      h1 { font-size: 1.6rem; }
      .avatar { width: 100px; height: 100px; font-size: 2.5rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">
      <i class="fas fa-user-astronaut"></i>
    </div>
    
    <h1>مهند الشيخ بهاء</h1>
    <div class="subtitle">مطور • رائد أعمال رقمي • مؤسس منظمة ميثاق</div>
    
    <div class="bio">
      متخصص في تقنية المعلومات والأمن السيبراني، مؤسس منظمة ميثاق الخيرية لدعم الأرامل والمطلقات، مهتم بالتطوير والابتكار الرقمي.
    </div>
    
    <div class="links">
      <a href="https://salla.sa/pk.2" class="link">
        <i class="fas fa-shopping-bag"></i>
        <span>المتجر الإلكتروني</span>
      </a>
      
      <a href="https://github.com/alshekbahaa" class="link">
        <i class="fab fa-github"></i>
        <span>GitHub</span>
      </a>
      
      <a href="mailto:contact@alshekbahaa.is-a.shop" class="link">
        <i class="fas fa-envelope"></i>
        <span>تواصل معي</span>
      </a>
      
      <a href="#" class="link">
        <i class="fas fa-hands-helping"></i>
        <span>منظمة ميثاق الخيرية</span>
      </a>
    </div>
    
    <div class="footer">
      © 2026 مهند الشيخ بهاء • alshekbahaa.is-a.shop
    </div>
  </div>
</body>
</html>
